<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Song Player </title>
    <style>
        body{
            background-color: rgb(236, 233, 228);
        }
        .btn{
            
            margin-top: 500px;
            border: none;
            background-color: rgb(223, 164, 55);
            color: rgb(252, 254, 255);
            width: 100px;
            height: 100px;
            border-radius: 30px;
            font-size: 30px;
            transition: transform 0.3s ease-in-out;
            
        }
        .btn:hover{

            transform:scale(1.009);
            background-color: rgb(224, 157, 31);
        }
    </style>

</head>
<body>
    <center>
    <button onclick="TogglePlay()" class="btn">▶︎‖</button>
    <button onclick="PlayRandom()" class="btn" style="margin-left: 50px;">⏭</button>
</center>

<audio id="audio"></audio>
    <script src="player.js"></script>
</body>
</html>
