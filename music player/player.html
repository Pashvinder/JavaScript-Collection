<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Song Player </title>
    <style>
        body{
            background-color: rgb(236, 233, 228);
        }
        button{
            margin-top: 500px;
            border: none;
            background-color: rgb(223, 164, 55);
            color: rgb(252, 254, 255);
            width: 100px;
            height: 100px;
            border-radius: 30px;
            font-size: 30px;
            transition: transform 0.3s ease-in-out;
            
        }
        button:hover{

            transform:scale(1.009);
            background-color: rgb(224, 157, 31);
        }
    </style>

</head>
<body>
    <button id="play" onclick="TogglePlay()">▶︎‖ </button>
    <audio src="PAIGAAM - Armaan Gill.mp3" id="paigaam"  ></audio>
    <script src="player.js"></script>
</body>
</html>
